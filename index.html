<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My First Page</title>
    <!-- Notice that the CSS file is in a subfolder called "css". -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Using an ID here. IDs can only be used on one element per page. -->
    <header id="main-header">
        <h1>My Website</h1>
        <p class="subtitle">Welcome to my page</p>
    </header>
    <!-- Using a class here. Classes can be used on multiple elements per page. -->
    <!-- Also, notice how we're using semantic containers to organize content and signify importance. -->
    <main>

        <section class="card">
            <h2>About Me</h2>
            <p>I am learning HTML and CSS!</p>
            <img src="https://via.placeholder.com/150" alt="profile picture">
        </section>

        <section class="card">
            <h2>My Links</h2>
            <a href="#" class="button">Click Me</a>
        </section>

    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
