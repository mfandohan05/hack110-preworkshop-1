<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Things that describe the page but don't need to be visible go here. -->
    <meta charset="utf-8">
    <!-- Tells the browser how it should interpret the text on your page, you should almost never change this! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tells the browser how to scale your website correctly on different screen sizes.-->
    <title>This text appears in the browser tab</title> <!-- Self explanatory. -->
</head>

<body>
    <!-- This is where your actual content goes. All content that you want to be visible on screen should be in your <body></body> tags! -->
</body>

</html>
